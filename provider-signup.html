<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Signup - CityMate</title>
    <link rel="stylesheet" href="signup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>CityMate</h1>
        <p class="tagline">Your First Friend in Every City</p>

        <h2>Create Provider Account</h2>

        <form id="providerSignupForm">

            <input type="text" id="providerName" placeholder="Full Name" autocomplete="name" required>

            <input type="email" id="providerEmail" placeholder="Email Address" autocomplete="email" required>

            <input type="tel" id="providerPhone" placeholder="Phone Number" pattern="[0-9]{10}" title="Enter a 10-digit phone number" autocomplete="tel" required>

            <input type="password" id="providerPassword" placeholder="Password (min. 6 characters)" minlength="6" autocomplete="new-password" required>

            <input type="password" id="providerConfirmPassword" placeholder="Confirm Password" minlength="6" autocomplete="new-password" required>

            <select id="serviceCategory" required>
                <option value="">Select Service Category</option>
                <option>Plumber</option>
                <option>Electrician</option>
                <option>Carpenter</option>
                <option>Painter</option>
                <option>Maid</option>
                <option>Salon</option>
                <option>AC Repair</option>
                <option>Computer Repair</option>
            </select>

            <input type="number" id="experience" placeholder="Experience (Years)" min="0" max="60" required>

            <select id="state" required>
                <option value="">Select State</option>
                <option value="MP">Madhya Pradesh</option>
                <option value="UP">Uttar Pradesh</option>
                <option value="MH">Maharashtra</option>
                <option value="RJ">Rajasthan</option>
            </select>

            <select id="city" required>
                <option value="">Select City</option>
            </select>

            <input type="text" id="area" placeholder="Area / Locality" autocomplete="address-level3" required>

            <p class="form-error" id="providerSignupError"></p>

            <button type="submit" id="providerSignupBtn">
                Register as Provider
            </button>

        </form>

        <p class="link">
            Already have an account?
            <a href="provider-login.html">Login</a>
        </p>

    </div>

</div>

<script>
const cities = {
    MP: ["Indore", "Bhopal", "Gwalior", "Jabalpur"],
    UP: ["Lucknow", "Kanpur", "Agra", "Varanasi"],
    MH: ["Mumbai", "Pune", "Nagpur", "Nashik"],
    RJ: ["Jaipur", "Jodhpur", "Udaipur", "Kota"]
};

const stateSelect = document.getElementById("state");
const citySelect = document.getElementById("city");

stateSelect.addEventListener("change", function () {
    citySelect.innerHTML = '<option value="">Select City</option>';

    const selectedState = this.value;

    if (cities[selectedState]) {
        cities[selectedState].forEach((city) => {
            const option = document.createElement("option");
            option.value = city;
            option.textContent = city;
            citySelect.appendChild(option);
        });
    }
});
</script>

<script type="module" src="provider-signup.js"></script>

</body>
</html>
