<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Signup - CityMate</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>CityMate</h1>
        <p class="tagline">Your First Friend in Every City</p>

        <h2>Create User Account</h2>

        <form id="userSignupForm">

            <input
                type="text"
                id="userName"
                placeholder="Full Name"
                required>

            <input
                type="email"
                id="userEmail"
                placeholder="Email Address"
                required>

            <input
                type="tel"
                id="userPhone"
                placeholder="Phone Number"
                required>

            <input
                type="password"
                id="userPassword"
                placeholder="Password"
                required>

            <input
                type="password"
                id="userConfirmPassword"
                placeholder="Confirm Password"
                required>

            <button type="submit">
                Create Account
            </button>

        </form>

        <p class="link">
            Already have an account?
            <a href="user-login.html">Login</a>
        </p>

    </div>

</div>

<script type="module" src="user-signup.js"></script>

</body>
</html>
