<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — CityMate</title>
<meta name="description" content="Manage your CityMate profile, saved addresses, and booking history.">
<link rel="icon" type="image/svg+xml" href="citymate-logo.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css?v=3">
<script src="app-data.js"></script>
</head>
<body class="profile-page">
<script>
    if(localStorage.getItem("citymate_loggedIn") !== "true"){
        window.location.replace("index.html");
    }
</script>

<nav class="page-navbar">
    <a class="brand" href="dashboard.html">
        <img src="logo.png" alt="">
        <span>Citymate</span>
    </a>
    <a class="back-link" href="dashboard.html">&larr; Back to dashboard</a>
</nav>

<div class="profile-wrap">

    <div class="profile-header">
        <div class="profile-avatar" id="profileAvatar">?</div>
        <div>
            <h1 id="profileGreetingName">Your profile</h1>
            <p>Manage your details, saved addresses, and booking history.</p>
        </div>
    </div>

    <!-- Basic details -->
    <div class="profile-section">
        <h2>
            Basic details
            <button type="button" class="edit-link" id="editDetailsBtn">Edit</button>
        </h2>

        <div id="detailsView" class="profile-field-row">
            <div>
                <label>Full name</label>
                <p class="value" id="viewFullName">—</p>
            </div>
            <div>
                <label>Email</label>
                <p class="value" id="viewEmail">—</p>
            </div>
        </div>

        <form id="detailsForm" class="profile-field-row" style="display:none;">
            <div>
                <label for="editFullName">Full name</label>
                <input id="editFullName" type="text" required>
            </div>
            <div>
                <label for="editEmail">Email</label>
                <input id="editEmail" type="email" required>
            </div>
            <div style="width:100%; margin-top:10px;">
                <button type="submit" class="small-btn">Save changes</button>
            </div>
        </form>
    </div>

    <!-- Saved addresses -->
    <div class="profile-section">
        <h2>Saved addresses</h2>
        <div class="address-list" id="addressList"></div>

        <form class="add-address-row" id="addAddressForm">
            <input type="text" id="newAddressLabel" placeholder="Label (e.g. Home, Work)" required style="max-width:160px;">
            <input type="text" id="newAddressText" placeholder="Area, street, city, landmark" required>
            <button type="submit" class="small-btn">Add address</button>
        </form>
    </div>

    <!-- Service history -->
    <div class="profile-section">
        <h2>Service history</h2>
        <div class="history-list" id="historyList"></div>
    </div>

</div>

<footer class="dash-footer">
    &copy; <span id="year"></span> CityMate. Your friend in every city.
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

const profile = CityMateData.getProfile();

function renderHeader(){
    const name = profile.fullName || "CityMate user";
    document.getElementById("profileGreetingName").textContent = name === "CityMate user" ? name : "Hi, " + name.split(" ")[0];
    document.getElementById("profileAvatar").textContent = (name.trim()[0] || "?").toUpperCase();
    document.getElementById("viewFullName").textContent = profile.fullName || "Not set yet";
    document.getElementById("viewEmail").textContent = profile.email || "Not set yet";
}
renderHeader();

/* ---- Edit basic details ---- */
const detailsView = document.getElementById("detailsView");
const detailsForm = document.getElementById("detailsForm");
const editDetailsBtn = document.getElementById("editDetailsBtn");

editDetailsBtn.addEventListener("click", function(){
    const editing = detailsForm.style.display !== "none";
    if(editing){
        detailsForm.style.display = "none";
        detailsView.style.display = "flex";
        editDetailsBtn.textContent = "Edit";
    } else {
        document.getElementById("editFullName").value = profile.fullName || "";
        document.getElementById("editEmail").value = profile.email || "";
        detailsView.style.display = "none";
        detailsForm.style.display = "flex";
        editDetailsBtn.textContent = "Cancel";
    }
});

detailsForm.addEventListener("submit", function(e){
    e.preventDefault();
    profile.fullName = document.getElementById("editFullName").value.trim();
    profile.email = document.getElementById("editEmail").value.trim();
    CityMateData.saveProfile(profile);
    renderHeader();
    detailsForm.style.display = "none";
    detailsView.style.display = "flex";
    editDetailsBtn.textContent = "Edit";
});

/* ---- Saved addresses ---- */
const addressList = document.getElementById("addressList");

function renderAddresses(){
    const addresses = profile.addresses || [];
    addressList.innerHTML = "";
    if(addresses.length === 0){
        addressList.innerHTML = '<p class="empty-note">No saved addresses yet — add one below so search forms can fill in faster next time.</p>';
        return;
    }
    addresses.forEach(function(addr, index){
        const item = document.createElement("div");
        item.className = "address-item";
        item.innerHTML =
            '<span><span class="addr-label">' + addr.label + '</span><span class="addr-text">' + addr.text + '</span></span>' +
            '<button type="button" class="remove-btn" data-remove-address="' + index + '">Remove</button>';
        addressList.appendChild(item);
    });
}
renderAddresses();

document.getElementById("addAddressForm").addEventListener("submit", function(e){
    e.preventDefault();
    const label = document.getElementById("newAddressLabel").value.trim();
    const text = document.getElementById("newAddressText").value.trim();
    if(!label || !text) return;
    CityMateData.addAddress({ label: label, text: text });
    Object.assign(profile, CityMateData.getProfile());
    renderAddresses();
    e.target.reset();
});

addressList.addEventListener("click", function(e){
    const btn = e.target.closest("[data-remove-address]");
    if(!btn) return;
    const idx = parseInt(btn.dataset.removeAddress, 10);
    profile.addresses.splice(idx, 1);
    CityMateData.saveProfile(profile);
    renderAddresses();
});

/* ---- Service history (from bookings saved by dashboard/results) ---- */
const historyList = document.getElementById("historyList");

function renderHistory(){
    const bookings = CityMateData.getBookings();
    historyList.innerHTML = "";
    if(bookings.length === 0){
        historyList.innerHTML = '<p class="empty-note">No bookings yet — search for a service from the dashboard to get started.</p>';
        return;
    }
    bookings.forEach(function(b){
        const dt = new Date(b.date);
        const dateLabel = isNaN(dt) ? "" : dt.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
        const place = [b.area, b.city].filter(Boolean).join(", ");
        const item = document.createElement("div");
        item.className = "history-item";
        item.innerHTML =
            '<span>' +
                '<span class="history-service">' + (b.service || "Service search") + '</span>' +
                '<span class="history-meta">' + (place || "Location not specified") + (b.status === "booked" ? " · Booked" : "") + '</span>' +
            '</span>' +
            '<span class="history-date">' + dateLabel + '</span>';
        historyList.appendChild(item);
    });
}
renderHistory();
</script>

</body>
</html>
