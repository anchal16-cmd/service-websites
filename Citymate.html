
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CityMate</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<img src="citymate.png" alt="CityMate Logo" class="logo">

<div class="hero">

    <h1>CityMate</h1>
    <p>Your Friend In Every City</p>

    <div class="buttons">
        <button class="find-btn">Find Services</button>
        <button class="explore-btn">Explore City</button>
    </div>

    <div class="auth-buttons">
        <button id="showLogin">Login</button>
        <button id="showSignup">Sign Up</button>
    </div>

    <!-- Login Form -->
    <div id="loginBox" class="form-container">
        <div class="card">

            <h2>Welcome Back</h2>

            <input type="email" placeholder="Enter Email">

            <input type="password" placeholder="Enter Password">

            <button class="submit-btn">Login</button>

        </div>
    </div>

    <!-- Signup Form -->
    <div id="signupBox" class="form-container">
        <div class="card">

            <h2>Create Account</h2>

            <input type="text" placeholder="Full Name">

            <input type="email" placeholder="Email">

            <input type="password" placeholder="Password">

            <input type="password" placeholder="Confirm Password">

            <button class="signup-submit-btn">Create Account</button>

        </div>
    </div>

</div>

<script>

const loginBtn = document.getElementById("showLogin");
const signupBtn = document.getElementById("showSignup");

const loginBox = document.getElementById("loginBox");
const signupBox = document.getElementById("signupBox");

loginBtn.addEventListener("click", () => {

    signupBox.style.display = "none";

    if(loginBox.style.display === "flex"){
        loginBox.style.display = "none";
    } else {
        loginBox.style.display = "flex";
    }

});

signupBtn.addEventListener("click", () => {

    loginBox.style.display = "none";

    if(signupBox.style.display === "flex"){
        signupBox.style.display = "none";
    } else {
        signupBox.style.display = "flex";
    }

});

</script>

</body>
</html>
