<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Results — CityMate</title>
<meta name="description" content="Browse verified service providers near you on CityMate.">
<link rel="icon" type="image/svg+xml" href="citymate-logo.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css?v=3">
<script src="india-locations.js"></script>
<script src="app-data.js"></script>
</head>
<body class="results-page">
<script>
    // Same login gate as dashboard.html — results can't be reached without
    // logging in first, even via a direct/bookmarked URL.
    if(localStorage.getItem("citymate_loggedIn") !== "true"){
        window.location.replace("index.html");
    }
</script>

<nav class="page-navbar">
    <a class="brand" href="dashboard.html">
        <img src="logo.png" alt="">
        <span>Citymate</span>
    </a>
    <a class="back-link" href="dashboard.html">&larr; Back to dashboard</a>
</nav>

<header class="results-hero">
    <p class="eyebrow">Search results</p>
    <h1 id="resultsTitle">Providers near you</h1>
    <p id="resultsSubtitle">Showing the best matches we found.</p>
</header>

<div class="results-filterbar" id="cityFilterBar" aria-label="Filter by city"></div>

<section class="results-list" id="resultsList" aria-live="polite">
    <!-- provider cards render here -->
</section>

<!-- Provider detail + review modal -->
<div id="providerModal" class="form-container" role="dialog" aria-modal="true" aria-labelledby="providerModalTitle">
    <div class="card provider-detail-card">
        <span class="close-btn" id="closeProviderModal" role="button" tabindex="0" aria-label="Close">&times;</span>

        <h2 id="providerModalTitle">Provider</h2>
        <p class="sub" id="providerModalSub"></p>

        <div class="field">
            <label>Your rating</label>
            <div class="star-input" id="starInput" role="radiogroup" aria-label="Rating, 1 to 5 stars">
                <button type="button" data-star="1" aria-label="1 star">★</button>
                <button type="button" data-star="2" aria-label="2 stars">★</button>
                <button type="button" data-star="3" aria-label="3 stars">★</button>
                <button type="button" data-star="4" aria-label="4 stars">★</button>
                <button type="button" data-star="5" aria-label="5 stars">★</button>
            </div>
        </div>
        <div class="field">
            <label for="reviewText">Your review</label>
            <textarea id="reviewText" placeholder="How was the service? (optional, but helps other users)"></textarea>
        </div>
        <button class="submit-btn" id="submitReviewBtn" type="button">Submit review</button>

        <div class="review-list" id="reviewList"></div>
    </div>
</div>

<footer class="dash-footer">
    &copy; <span id="year"></span> CityMate. Your friend in every city.
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

const params  = new URLSearchParams(window.location.search);
const service = params.get("service") || "";
const stateQ  = params.get("state") || "";
const cityQ   = params.get("city") || "";
const areaQ   = params.get("area") || "";

document.getElementById("resultsTitle").textContent = service ? (service + " near you") : "Providers near you";
document.getElementById("resultsSubtitle").textContent = [areaQ, cityQ, stateQ].filter(Boolean).length
    ? "Showing results for " + [areaQ, cityQ, stateQ].filter(Boolean).join(", ")
    : "Showing the best matches we found.";

const resultsList   = document.getElementById("resultsList");
const cityFilterBar = document.getElementById("cityFilterBar");

let activeCity = cityQ || "";

function renderStars(rating){
    const full = Math.round(rating);
    let out = "";
    for(let i = 1; i <= 5; i++) out += (i <= full ? "★" : "☆");
    return out;
}

function renderProviderCard(p){
    const card = document.createElement("article");
    card.className = "provider-card";
    card.innerHTML =
        '<div class="provider-top">' +
            '<div>' +
                '<h3 class="provider-name"><a href="#" data-open-provider="' + p.id + '">' + p.name + '</a></h3>' +
                (p.verified ? '<span class="verified-badge">✔ Verified</span>' : '') +
            '</div>' +
        '</div>' +
        '<div class="provider-rating">' +
            '<span class="stars">' + renderStars(p.rating) + '</span>' +
            '<span>' + (p.rating ? p.rating.toFixed(1) : "New") + '</span>' +
            '<span class="review-count">(' + p.reviewCount + ' review' + (p.reviewCount === 1 ? "" : "s") + ')</span>' +
        '</div>' +
        '<p class="provider-meta">📍 ' + [p.area, p.city].filter(Boolean).join(", ") + '</p>' +
        '<p class="provider-experience">' + p.experience + '+ years experience</p>' +
        '<div class="provider-actions">' +
            '<a class="call-btn" href="tel:' + p.phone.replace(/\s+/g, "") + '">📞 Call now</a>' +
            '<button class="book-btn" type="button" data-book="' + p.id + '">Book now</button>' +
        '</div>';
    return card;
}

function renderEmptyState(){
    resultsList.innerHTML = "";
    const wrap = document.createElement("div");
    wrap.className = "empty-state";
    wrap.innerHTML =
        '<h3>No providers found yet</h3>' +
        '<p>We don\'t have ' + (service || "that service") + ' providers listed in ' + (activeCity || "this city") + ' yet. Try another nearby city, or check back soon as more partners join.</p>' +
        '<a href="dashboard.html">Try another search</a>';
    resultsList.appendChild(wrap);
}

function renderCityFilters(allMatches){
    const cities = Array.from(new Set(allMatches.map(function(p){ return p.city; })));
    if(cities.length <= 1){ cityFilterBar.innerHTML = ""; return; }

    cityFilterBar.innerHTML = "";
    cities.forEach(function(city){
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "filter-chip" + (city.toLowerCase() === activeCity.toLowerCase() ? " active" : "");
        chip.textContent = city;
        chip.addEventListener("click", function(){
            activeCity = city;
            runSearch();
        });
        cityFilterBar.appendChild(chip);
    });
}

function runSearch(){
    const byService = CityMateData.findProviders({ service: service });
    renderCityFilters(byService);

    const final = activeCity
        ? byService.filter(function(p){ return p.city.toLowerCase() === activeCity.toLowerCase(); })
        : byService;

    resultsList.innerHTML = "";
    if(final.length === 0){
        renderEmptyState();
        return;
    }
    // Highest rated first.
    final.slice().sort(function(a, b){ return b.rating - a.rating; }).forEach(function(p){
        resultsList.appendChild(renderProviderCard(p));
    });
}

runSearch();

/* -----------------------------------------------------------------
   Provider detail modal: shows reviews + lets the user leave one.
   Booking ("Book now") also opens this same modal pre-scrolled to
   the review form, framed as confirming the booking.
   ----------------------------------------------------------------- */
const providerModal     = document.getElementById("providerModal");
const providerModalTitle = document.getElementById("providerModalTitle");
const providerModalSub  = document.getElementById("providerModalSub");
const closeProviderModal = document.getElementById("closeProviderModal");
const starInput          = document.getElementById("starInput");
const reviewText         = document.getElementById("reviewText");
const submitReviewBtn    = document.getElementById("submitReviewBtn");
const reviewList         = document.getElementById("reviewList");

let activeProviderId = null;
let selectedStars = 0;

function setStars(n){
    selectedStars = n;
    starInput.querySelectorAll("button").forEach(function(btn){
        btn.classList.toggle("filled", parseInt(btn.dataset.star, 10) <= n);
    });
}

starInput.querySelectorAll("button").forEach(function(btn){
    btn.addEventListener("click", function(){ setStars(parseInt(btn.dataset.star, 10)); });
});

function renderReviews(providerId){
    const reviews = CityMateData.getReviews(providerId);
    reviewList.innerHTML = "";
    if(reviews.length === 0){
        reviewList.innerHTML = '<p class="review-empty">No reviews yet — be the first to share how it went.</p>';
        return;
    }
    reviews.slice().reverse().forEach(function(r){
        const item = document.createElement("div");
        item.className = "review-item";
        item.innerHTML =
            '<span class="review-stars">' + renderStars(r.rating) + '</span>' +
            '<span class="review-author">' + (r.author || "Anonymous") + '</span>' +
            '<span class="review-date">' + r.date + '</span>' +
            '<p class="review-text">' + r.text + '</p>';
        reviewList.appendChild(item);
    });
}

function openProviderModal(providerId, intent){
    const provider = CityMateData.getAllProviders().find(function(p){ return p.id === providerId; });
    if(!provider) return;

    activeProviderId = providerId;
    providerModalTitle.textContent = provider.name;
    providerModalSub.textContent = intent === "book"
        ? "Booking confirmed — " + provider.name + " will be notified. Leave a rating once the work is done."
        : provider.service + " in " + provider.area + ", " + provider.city;

    setStars(0);
    reviewText.value = "";
    renderReviews(providerId);
    providerModal.classList.add("open");
}

function closeProviderModalFn(){
    providerModal.classList.remove("open");
}

closeProviderModal.addEventListener("click", closeProviderModalFn);
providerModal.addEventListener("click", function(e){ if(e.target === providerModal) closeProviderModalFn(); });
document.addEventListener("keydown", function(e){ if(e.key === "Escape") closeProviderModalFn(); });

resultsList.addEventListener("click", function(e){
    const link = e.target.closest("[data-open-provider]");
    const bookBtn = e.target.closest("[data-book]");

    if(link){
        e.preventDefault();
        openProviderModal(link.dataset.openProvider, "view");
    } else if(bookBtn){
        CityMateData.addBooking({ providerId: bookBtn.dataset.book, service: service, city: cityQ, area: areaQ, status: "booked" });
        openProviderModal(bookBtn.dataset.book, "book");
    }
});

submitReviewBtn.addEventListener("click", function(){
    if(!activeProviderId) return;
    if(selectedStars === 0){
        alert("Please select a star rating before submitting.");
        return;
    }
    const profile = CityMateData.getProfile();
    CityMateData.addReview(activeProviderId, {
        author: profile.fullName || "Anonymous",
        rating: selectedStars,
        text: reviewText.value.trim() || "(no written feedback)"
    });
    renderReviews(activeProviderId);
    setStars(0);
    reviewText.value = "";
});
</script>

</body>
</html>
