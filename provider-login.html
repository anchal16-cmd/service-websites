<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Login - CityMate</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="login-container provider-theme">

    <div class="top-bar">
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back</a>
        <a href="provider-signup.html">New here? Sign up</a>
    </div>

    <div class="profile-icon">
        <i class="fa-solid fa-hard-hat"></i>
    </div>

    <h1>Welcome Back, Provider</h1>
    <p class="subtitle">Login to manage your service listings</p>

    <form id="providerLoginForm">

        <label for="providerEmail">Email Address</label>
        <input
            type="email"
            id="providerEmail"
            placeholder="you@example.com"
            autocomplete="email"
            required>

        <label for="providerPassword">Password</label>
        <div class="password-box">
            <input
                type="password"
                id="providerPassword"
                placeholder="Enter your password"
                autocomplete="current-password"
                required>
            <i class="fa-solid fa-eye" id="toggleProviderPassword"></i>
        </div>

        <div class="options">
            <label>
                <input type="checkbox" id="rememberMe">
                Remember me
            </label>
            <a href="#" id="forgotPasswordLink">Forgot password?</a>
        </div>

        <p class="form-error" id="providerLoginError"></p>

        <button type="submit" class="login-btn" id="providerLoginBtn">
            Login
        </button>

    </form>

    <p class="signup-text">
        Don't have a provider account?
        <a href="provider-signup.html">Register as Provider</a>
    </p>

</div>

<script type="module" src="provider-login.js"></script>

</body>
</html>
