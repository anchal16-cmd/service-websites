<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Local Services | CityMate</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet"
href="local-services.css">
</head>

<body>

<div class="container">

    <div class="header">

        <a href="index.html">
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <h2>Local Services</h2>

    </div>


    <div class="service-list">

        <div class="service-item"
             onclick="location.href='plumber.html'">

            <div class="left">

                <i class="fa-solid fa-wrench"></i>

                <div>
                    <h3>Plumber</h3>
                    <p>Water pipes, taps & repair</p>
                </div>

            </div>

            <i class="fa-solid fa-chevron-right"></i>

        </div>


        <div class="service-item"
             onclick="location.href='electrician.html'">

            <div class="left">

                <i class="fa-solid fa-bolt"></i>

                <div>
                    <h3>Electrician</h3>
                    <p>Home electrical services</p>
                </div>

            </div>

            <i class="fa-solid fa-chevron-right"></i>

        </div>


        <div class="service-item"
             onclick="location.href='maid.html'">

            <div class="left">

                <i class="fa-solid fa-broom"></i>

                <div>
                    <h3>Maid</h3>
                    <p>Cleaning & housekeeping</p>
                </div>

            </div>

            <i class="fa-solid fa-chevron-right"></i>

        </div>


        <div class="service-item"
             onclick="location.href='carpenter.html'">

            <div class="left">

                <i class="fa-solid fa-hammer"></i>

                <div>
                    <h3>Carpenter</h3>
                    <p>Furniture & wood repair</p>
                </div>

            </div>

            <i class="fa-solid fa-chevron-right"></i>

        </div>


        <div class="service-item"
             onclick="location.href='painter.html'">

            <div class="left">

                <i class="fa-solid fa-paint-roller"></i>

                <div>
                    <h3>Painter</h3>
                    <p>Home painting services</p>
                </div>

            </div>

            <i class="fa-solid fa-chevron-right"></i>

        </div>

    </div>

</div>

</body>
</html>
