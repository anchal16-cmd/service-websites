<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Signup - CityMate</title>
    <link rel="stylesheet" href="signup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>CityMate</h1>
        <p class="tagline">Your First Friend in Every City</p>

        <h2>Create User Account</h2>

        <form id="userSignupForm">

            <input
                type="text"
                id="userName"
                placeholder="Full Name"
                autocomplete="name"
                required>

            <input
                type="email"
                id="userEmail"
                placeholder="Email Address"
                autocomplete="email"
                required>

            <input
                type="tel"
                id="userPhone"
                placeholder="Phone Number"
                pattern="[0-9]{10}"
                title="Enter a 10-digit phone number"
                autocomplete="tel"
                required>

            <input
                type="password"
                id="userPassword"
                placeholder="Password (min. 6 characters)"
                minlength="6"
                autocomplete="new-password"
                required>

            <input
                type="password"
                id="userConfirmPassword"
                placeholder="Confirm Password"
                minlength="6"
                autocomplete="new-password"
                required>

            <p class="form-error" id="userSignupError"></p>

            <button type="submit" id="userSignupBtn">
                Create Account
            </button>

        </form>

        <p class="link">
            Already have an account?
            <a href="user-login.html">Login</a>
        </p>

    </div>

</div>

<script type="module" src="user-signup.js"></script>

</body>
</html>
